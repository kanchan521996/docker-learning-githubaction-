name: Building docker image

on:
  push:
    branches: [ main, develop ]   # adjust to your needs
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  creating_image:
    runs-on: ubuntu-latest          # typo fixed
    steps:
      - name: getting the code
        uses: actions/checkout@v4

      - name: Generate Docker tag
        id: vars
        run: |
          # Use commit SHA (shortened) + timestamp for uniqueness
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          echo "AUTO_TAG=${SHORT_SHA}-${TIMESTAMP}" >> $GITHUB_ENV
          # Alternative: just the commit SHA
          # echo "AUTO_TAG=${SHORT_SHA}" >> $GITHUB_ENV

      - name: build the image
        run: docker build -t githubaction:${{ env.AUTO_TAG }} .

      - name: login to aws
        uses: aws-actions/configure-aws-credentials@v4   # updated to latest major
        with:
          role-to-assume: arn:aws:iam::354089337523:role/github-action-for-ecr   # FIX: use ROLE ARN, not policy
          aws-region: ap-south-1

      - name: login to ecr
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin 354089337523.dkr.ecr.ap-south-1.amazonaws.com

      - name: tag image for ecr
        run: |
          docker tag githubaction:${{ env.AUTO_TAG }} 354089337523.dkr.ecr.ap-south-1.amazonaws.com/githubaction:${{ env.AUTO_TAG }}
          # Optionally also tag as 'latest'
          docker tag githubaction:${{ env.AUTO_TAG }} 354089337523.dkr.ecr.ap-south-1.amazonaws.com/githubaction:latest

      - name: push the image to ecr
        run: |
          docker push 354089337523.dkr.ecr.ap-south-1.amazonaws.com/githubaction:${{ env.AUTO_TAG }}
          # Optionally push 'latest' as well
          docker push 354089337523.dkr.ecr.ap-south-1.amazonaws.com/githubaction:latest